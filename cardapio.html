<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardápio Digital - Aurora</title>
    <style>
        /* [Mantive seus estilos originais que já funcionam bem no mobile] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; color: #333; margin: 0; padding-bottom: 80px; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .event-name { font-size: 1.2em; font-weight: bold; color: #f1c40f; text-transform: uppercase; letter-spacing: 1px; }
        .user-info { font-size: 0.8em; color: #bdc3c7; margin-top: 2px; }
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-top: 50px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1em; margin-bottom: 15px; text-align: center; }
        .drink-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; padding: 10px; margin-bottom: 15px; border: 2px solid transparent; }
        .drink-card.selected { border-color: #3498db; background: #eef7fc; }
        .img-container { position: relative; width: 75px; height: 75px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .drink-img { width: 100%; height: 100%; object-fit: cover; }
        .drink-info { flex: 1; padding: 0 12px; }
        .drink-name { font-weight: bold; font-size: 1.1em; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: none; background: #ecf0f1; font-weight: bold; }
        .btn-qty.active { background: #3498db; color: white; }
        .float-cart { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #2c3e50; color: white; padding: 15px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; z-index: 200; }
        .float-cart.visible { display: flex; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; width: 90%; max-width: 400px; border-radius: 15px; overflow: hidden; position: relative; }
        .modal-body { padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="event-name" id="headerEventName">Carregando...</div>
        <div class="user-info" id="headerUserInfo"></div>
    </div>

    <div id="view-login" class="view active">
        <div class="login-box">
            <h3>🍹 Seja bem-vindo!</h3>
            <p style="color:#666;">Como devemos chamar você no balcão?</p>
            <input type="text" id="inputNome" placeholder="Seu Nome">
            <button class="btn-qty active" style="width:100%; height: 50px; border-radius: 10px;" onclick="entrar()">Entrar no Evento</button>
        </div>
    </div>

    <div id="view-menu" class="view">
        <div id="menu-list"></div>
    </div>

    <div id="view-status" class="view">
        <div style="text-align:center; margin-top:50px;">
            <h2 id="statusTitle">...</h2>
            <p id="statusDesc">Aguardando atualização do bar...</p>
            <div id="statusItems" style="background:white; padding:15px; border-radius:10px; margin-top:20px;"></div>
        </div>
    </div>

    <div class="float-cart" id="floatCart" onclick="enviarPedido()">
        <span>🛒 <span id="cartCount">0</span> itens selecionados</span>
        <button style="background:#f1c40f; border:none; padding:8px 20px; border-radius:20px; font-weight:bold;">PEDIR AGORA</button>
    </div>

    <div id="modal-detalhes" class="modal-overlay" onclick="fecharDetalhes(event)">
        <div class="modal-content">
            <img id="modal-img" src="" style="width:100%; height:200px; object-fit:cover;">
            <div class="modal-body">
                <h2 id="modal-titulo"></h2>
                <p style="color:#e67e22; font-weight:bold; font-size:0.9em;">COMPOSIÇÃO:</p>
                <ul id="modal-lista" style="padding-left:20px; color:#555;"></ul>
                <button onclick="document.getElementById('modal-detalhes').style.display='none'" style="width:100%; padding:12px; margin-top:15px;">Fechar</button>
            </div>
        </div>
    </div>

<script type="module">
    const API_BASE = "https://aurora-api-zj8e.onrender.com";
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, limit, serverTimestamp, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBu8y9RQMv9fbxORcRLAZN4OlA1IEXyZUU",
        authDomain: "aurora-bar-system.firebaseapp.com",
        projectId: "aurora-bar-system",
        storageBucket: "aurora-bar-system.firebasestorage.app",
        messagingSenderId: "380441809814",
        appId: "1:380441809814:web:ad008f37d30a5b0abe03b7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ESTADO
    let eventoID = null; // ID vindo do PostgreSQL
    let urlSlug = new URLSearchParams(window.location.search).get('festa');
    let usuario = { nome: localStorage.getItem('aurora_user_nome'), id: localStorage.getItem('aurora_user_id') };
    let carrinho = {};
    let cacheDrinks = [];

    window.onload = async () => {
        if (!urlSlug) return alert("QR Code inválido ou incompleto.");
        await carregarConfiguracoesEvento();
    };

    // 1. BUSCA DADOS DO NOVO BANCO (POSTGRESQL)
    async function carregarConfiguracoesEvento() {
        try {
            const res = await fetch(`${API_BASE}/menu/${urlSlug}`);
            const data = await res.json();

            if (!data.drinks) throw new Error("Evento não encontrado");

            eventoID = data.event_id || urlSlug; // Fallback se não vier ID
            document.getElementById('headerEventName').innerText = data.festa;
            cacheDrinks = data.drinks;

            if (usuario.nome) {
                document.getElementById('headerUserInfo').innerText = `Olá, ${usuario.nome}`;
                verificarStatusPedido();
            }
        } catch (e) {
            alert("Erro ao carregar o cardápio. Verifique sua conexão.");
        }
    }

    window.entrar = () => {
        const nome = document.getElementById('inputNome').value.trim();
        if (!nome) return alert("Diga-nos seu nome!");
        
        usuario.nome = nome.toUpperCase();
        usuario.id = 'u' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('aurora_user_nome', usuario.nome);
        localStorage.setItem('aurora_user_id', usuario.id);
        
        location.reload();
    };

    // 2. RENDERIZA O CARDÁPIO (DADOS DO POSTGRES)
    function renderizarCardapio() {
        const lista = document.getElementById('menu-list');
        lista.innerHTML = '';
        
        cacheDrinks.forEach((d, index) => {
            const div = document.createElement('div');
            div.className = `drink-card ${carrinho[d.nome] ? 'selected' : ''}`;
            div.innerHTML = `
                <div class="img-container" onclick="verDetalhes(${index})">
                    <img src="${d.foto || './imagens/drink_default.jpg'}" class="drink-img">
                </div>
                <div class="drink-info">
                    <div class="drink-name">${d.nome_do_drink}</div>
                    <small style="color:#7f8c8d">${d.descricao || ''}</small>
                </div>
                <div class="qty-control">
                    <button class="btn-qty" onclick="alterarQtd('${d.nome_do_drink}', -1)">-</button>
                    <span class="qty-val">${carrinho[d.nome_do_drink]?.qtd || 0}</span>
                    <button class="btn-qty active" onclick="alterarQtd('${d.nome_do_drink}', 1)">+</button>
                </div>
            `;
            lista.appendChild(div);
        });
        mostrarView('view-menu');
    }

    window.alterarQtd = (nome, delta) => {
        if (!carrinho[nome]) carrinho[nome] = { nome: nome, qtd: 0 };
        
        const totalNoCarrinho = Object.values(carrinho).reduce((a, b) => a + b.qtd, 0);
        if (delta > 0 && totalNoCarrinho >= 2) return alert("Máximo de 2 drinks por pedido!");

        carrinho[nome].qtd += delta;
        if (carrinho[nome].qtd <= 0) delete carrinho[nome];
        
        renderizarCardapio();
        atualizarBotaoCarrinho();
    };

    function atualizarBotaoCarrinho() {
        const total = Object.values(carrinho).reduce((a, b) => a + b.qtd, 0);
        document.getElementById('cartCount').innerText = total;
        document.getElementById('floatCart').style.display = total > 0 ? 'flex' : 'none';
    }

    // 3. ENVIA O PEDIDO (PARA O KDS NO FIREBASE)
    window.enviarPedido = async () => {
        const itens = Object.values(carrinho);
        try {
            await addDoc(collection(db, "eventos", eventoID, "pedidos"), {
                cliente: usuario.nome,
                clienteID: usuario.id,
                itens: itens,
                status: 'Pendente',
                data: serverTimestamp(),
                origem: 'App'
            });
            carrinho = {};
            verificarStatusPedido();
        } catch (e) {
            alert("Erro ao enviar pedido.");
        }
    };

    // 4. MONITORAMENTO DE STATUS (KDS -> CELULAR DO CLIENTE)
    function verificarStatusPedido() {
        const q = query(
            collection(db, "eventos", eventoID, "pedidos"),
            where("clienteID", "==", usuario.id),
            where("status", "in", ["Pendente", "Preparando", "Pronto"]),
            limit(1)
        );

        onSnapshot(q, (snap) => {
            if (snap.empty) {
                renderizarCardapio();
                mostrarView('view-menu');
            } else {
                const p = snap.docs[0].data();
                const statusItems = document.getElementById('statusItems');
                statusItems.innerHTML = p.itens.map(i => `<b>${i.qtd}x ${i.nome}</b>`).join('<br>');
                
                document.getElementById('statusTitle').innerText = p.status.toUpperCase();
                document.getElementById('statusDesc').innerText = p.status === 'Pronto' ? 'Vem buscar! 🍹' : 'Estamos preparando...';
                
                mostrarView('view-status');
                if (p.status === 'Pronto' && navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        });
    }

    window.verDetalhes = (idx) => {
        const d = cacheDrinks[idx];
        document.getElementById('modal-img').src = d.foto || './imagens/drink_default.jpg';
        document.getElementById('modal-titulo').innerText = d.nome_do_drink;
        // O SQL já traz os ingredientes formatados na descrição ou você pode tratar aqui
        document.getElementById('modal-lista').innerHTML = `<li>${d.descricao}</li>`;
        document.getElementById('modal-detalhes').style.display = 'flex';
    };

    function mostrarView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
